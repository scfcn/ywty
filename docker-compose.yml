name: ywty

services:
  ywty:
    image: ghcr.io/scfcn/ywty:latest
    container_name: yunwu
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    environment:
      YWTY_AUTH_JWT_SECRET: ${JWT_SECRET:-please-change-me}
      YWTY_APP_BASEURL: ${APP_URL:-http://localhost:3000}
      YWTY_STORAGE_DRIVER_PUBLICURL: ${APP_URL:-http://localhost:3000}/uploads
      YWTY_DATABASE_DRIVER: ${DB_DRIVER:-mysql}
      YWTY_DATABASE_HOST: ${DB_HOST:-mysql}
      YWTY_DATABASE_PORT: ${DB_PORT:-3306}
      YWTY_DATABASE_USERNAME: ${DB_USER:-ywty}
      YWTY_DATABASE_PASSWORD: ${DB_PASSWORD:-secret}
      YWTY_DATABASE_DBNAME: ${DB_NAME:-ywty}
      YWTY_REDIS_ADDR: ${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      YWTY_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - ywty_data:/data
    ports:
      - "${PORT:-3000}:3000"
    networks: [ywty_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ============== MySQL（默认启动；推荐 MariaDB 10.6.20） ==============
  # 禁用内置 MySQL：--scale mysql=0，并设 DB_HOST 指向宿主机
  mysql:
    image: mariadb:10.6.20
    container_name: yunwu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_NAME:-ywty}
      MYSQL_USER: ${DB_USER:-ywty}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks: [ywty_net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ============== Redis锛堥粯璁ゅ惎鍔級 ==============
  # 绂佺敤鍐呯疆 Redis锛?-scale redis=0锛屽苟璁?REDIS_HOST 鎸囧悜瀹夸富鏈?  redis:
    image: redis:7-alpine
    container_name: yunwu-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks: [ywty_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============== 杩佺Щ浠诲姟 ==============
  # docker compose run --rm migrate
  migrate:
    image: ghcr.io/scfcn/ywty:latest
    profiles: [migrate]
    container_name: yunwu-migrate
    environment:
      YWTY_DATABASE_DRIVER: ${DB_DRIVER:-mysql}
      YWTY_DATABASE_HOST: ${DB_HOST:-mysql}
      YWTY_DATABASE_PORT: ${DB_PORT:-3306}
      YWTY_DATABASE_USERNAME: ${DB_USER:-ywty}
      YWTY_DATABASE_PASSWORD: ${DB_PASSWORD:-secret}
      YWTY_DATABASE_DBNAME: ${DB_NAME:-ywty}
      YWTY_DATABASE_PATH: /data/ywty.db
    volumes:
      - ywty_data:/data
    networks: [ywty_net]
    entrypoint: ["/app/migrate"]

volumes:
  ywty_data:
  mysql_data:
  redis_data:

networks:
  ywty_net:
    driver: bridge
