# =========================================
# ywty Docker Compose
# 默认：ywty + MySQL + Redis（内置）
#   docker compose up -d
# 连接宿主机已有 MySQL/Redis：
#   DB_HOST=host.docker.internal REDIS_HOST=host.docker.internal docker compose up -d --scale mysql=0 --scale redis=0
# 本地开发用 SQLite（无 MySQL/Redis）：
#   DB_DRIVER=sqlite docker compose up -d --scale mysql=0 --scale redis=0
# =========================================

name: ywty

services:
  ywty:
    image: ghcr.io/scfcn/ywty:latest
    container_name: ywty
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    environment:
      # --- 必改（生产）---
      YWTY_AUTH_JWT_SECRET: ${JWT_SECRET:-please-change-me}
      YWTY_APP_BASEURL: ${APP_URL:-http://localhost:3000}
      YWTY_STORAGE_DRIVER_PUBLICURL: ${APP_URL:-http://localhost:3000}/uploads
      # --- 数据库 ---
      # 默认 mysql（内置容器）；连接宿主机：DB_HOST=host.docker.internal；本地开发：DB_DRIVER=sqlite
      YWTY_DATABASE_DRIVER: ${DB_DRIVER:-mysql}
      YWTY_DATABASE_HOST: ${DB_HOST:-mysql}
      YWTY_DATABASE_PORT: ${DB_PORT:-3306}
      YWTY_DATABASE_USERNAME: ${DB_USER:-ywty}
      YWTY_DATABASE_PASSWORD: ${DB_PASSWORD:-secret}
      YWTY_DATABASE_DBNAME: ${DB_NAME:-ywty}
      # 仅 DB_DRIVER=sqlite 时生效
      YWTY_DATABASE_PATH: /data/ywty.db
      # --- Redis ---
      # 默认内置容器；连接宿主机：REDIS_HOST=host.docker.internal
      YWTY_REDIS_ADDR: ${REDIS_HOST:-redis}:${REDIS_PORT:-6379}
      YWTY_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - ywty_data:/data
    ports:
      - "${PORT:-3000}:3000"
    networks: [ywty_net]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  # ============== MySQL（默认启动） ==============
  # 禁用内置 MySQL：--scale mysql=0，并设 DB_HOST 指向宿主机
  mysql:
    image: mysql:8.0
    container_name: ywty-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_NAME:-ywty}
      MYSQL_USER: ${DB_USER:-ywty}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks: [ywty_net]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ============== Redis（默认启动） ==============
  # 禁用内置 Redis：--scale redis=0，并设 REDIS_HOST 指向宿主机
  redis:
    image: redis:7-alpine
    container_name: ywty-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks: [ywty_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============== 迁移任务 ==============
  # docker compose run --rm migrate
  migrate:
    image: ghcr.io/scfcn/ywty:latest
    profiles: [migrate]
    container_name: ywty-migrate
    environment:
      YWTY_DATABASE_DRIVER: ${DB_DRIVER:-mysql}
      YWTY_DATABASE_HOST: ${DB_HOST:-mysql}
      YWTY_DATABASE_PORT: ${DB_PORT:-3306}
      YWTY_DATABASE_USERNAME: ${DB_USER:-ywty}
      YWTY_DATABASE_PASSWORD: ${DB_PASSWORD:-secret}
      YWTY_DATABASE_DBNAME: ${DB_NAME:-ywty}
      YWTY_DATABASE_PATH: /data/ywty.db
    volumes:
      - ywty_data:/data
    networks: [ywty_net]
    entrypoint: ["/app/migrate"]

volumes:
  ywty_data:
  mysql_data:
  redis_data:

networks:
  ywty_net:
    driver: bridge
