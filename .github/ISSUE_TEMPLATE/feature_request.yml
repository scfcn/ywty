name: ✨ Feature Request
description: 提议新功能
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢你提议新功能！请先在 Discussions 与社区讨论，确认方向后再提 Issue。

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题？
      description: 描述当前痛点或工作流不顺的地方
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你想要的解决方案
      description: 描述期望的功能或改进
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过的其他做法
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 存储驱动
        - 鉴权 / 权限
        - 鉴权驱动（短信 / 邮件 / 社交）
        - 图片处理 / 扫描
        - 支付 / 套餐
        - 后台管理
        - 用户中心
        - API
        - 文档 / 部署
        - 其他
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 其他信息
      description: 参考链接、竞品对比、截图等
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 自检
      options:
        - label: 我已搜索过相关 Issue / PR
        - label: 我愿意自己实现并提交 PR
        - label: 我已查阅 [REFACTOR_PLAN.md](./REFACTOR_PLAN.md) 了解路线图
