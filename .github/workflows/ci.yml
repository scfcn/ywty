name: CI

on:
  push:
    branches: [main, develop, release/**]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"

jobs:
  # =========================================
  # 后端：编译、静态检查、测试
  # =========================================
  backend:
    name: Go · build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: server/go.sum

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: gofmt check
        run: |
          if [ "$(gofmt -l . | wc -l)" -ne 0 ]; then
            echo "Files not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build all packages
        run: go build -v ./...

      - name: Run unit tests
        run: go test -race -shuffle=on -timeout 5m -coverprofile=coverage.out ./...
        env:
          YWTY_AUTH_JWT_SECRET: ci-test-secret

      - name: Upload coverage to Codecov
        if: matrix == false || true
        uses: codecov/codecov-action@v4
        with:
          files: server/coverage.out
          flags: backend
          fail_ci_if_error: false

  # =========================================
  # 前端：类型检查、Lint、构建
  # =========================================
  frontend:
    name: Nuxt · typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-nuxt
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web-nuxt/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx nuxi typecheck
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NUXT_API_BASE: ""

  # =========================================
  # Docker 镜像构建测试（不推送）
  # =========================================
  docker:
    name: Docker · build test
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ywty:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
