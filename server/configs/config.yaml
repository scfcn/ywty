# 应用配置
app:
  name: "云雾图驿"
  env: "prod"
  version: "0.1.0"
  host: "0.0.0.0"
  port: 3000
  timezone: "Asia/Shanghai"
  base_url: "http://localhost:3000"

# 数据库（默认 sqlite，开箱即用；需要 MySQL 时改为 mysql）
database:
  driver: "sqlite"
  path: "/data/ywty.db"
  # MySQL（按需启用）
  # driver: "mysql"
  # host: "127.0.0.1"
  # port: 3306
  # username: "ywty"
  # password: "secret"
  # dbname: "ywty"
  # charset: "utf8mb4"
  # parse_time: true
  # loc: "Local"
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600
  conn_max_idle_time: 600

# Redis（留空则禁用队列功能，纯 SQLite 模式下可不配置）
redis:
  addr: ""
  password: ""
  db: 0

# 队列
queue:
  concurrency: 10
  queues:
    - "critical"
    - "default"
    - "low"

# 日志
log:
  level: "info"
  format: "console"
  output: "stdout"
  file_path: "storage/logs/app.log"
  max_size: 100
  max_age: 7
  max_backups: 10
  compress: true

# CORS
cors:
  allow_origins:
    - "*"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "PATCH"
    - "OPTIONS"
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Authorization"
    - "X-Token"
  expose_headers:
    - "Content-Length"
  allow_credentials: true
  max_age: 86400

# 鉴权
auth:
  jwt:
    secret: "please-change-me-in-production"
    issuer: "ywty"
    access_expire: 7200
    refresh_expire: 2592000
  admin_session:
    name: "ywty_admin_session"
    secret: "please-change-me-too"
    expire: 7200
  captcha:
    enable: true
    expire: 300

# 限流
ratelimit:
  enable: true
  upload_per_minute: 60
  api_per_minute: 300

# 存储
storage:
  driver:
    provider: "local"
    root: "/data/uploads"
    public_url: "http://localhost:3000/uploads"
    visibility: "public"
    extra: {}

# 邮件
mail:
  provider: "log"
  host: ""
  port: 587
  username: ""
  password: ""
  from: ""
  from_name: "ywty"

# 短信
sms:
  provider: "log"
  access_key: ""
  secret_key: ""
  sign: ""
  region: ""
